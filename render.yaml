services:
  # Frontend Service
  - type: web
    name: elias-portfolio-frontend
    env: static
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        value: https://elias-portfolio-backend.onrender.com
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /api/*
        destination: https://elias-portfolio-backend.onrender.com/*

  # Backend Service
  - type: web
    name: elias-portfolio-backend
    env: node
    buildCommand: cd server && npm ci
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://elias-portfolio-frontend.onrender.com
      - key: DATABASE_URL
        value: ${DATABASE_URL}
      - key: JWT_SECRET
        value: ${JWT_SECRET}
      - key: EMAIL_HOST
        value: ${EMAIL_HOST}
      - key: EMAIL_PORT
        value: ${EMAIL_PORT}
      - key: EMAIL_USER
        value: ${EMAIL_USER}
      - key: EMAIL_PASS
        value: ${EMAIL_PASS}
    healthCheckPath: /api/health

# PostgreSQL Service (Free tier)
databases:
  - name: elias-portfolio-db
    databaseName: elias_portfolio
    user: elias
    plan: free

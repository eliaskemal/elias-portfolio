version: '3.8'
services:
  mongodb:
    image: mongo:6
    container_name: elias-portfolio-db
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  app:
    build: .
    container_name: elias-portfolio-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:password@mongodb:27017/elias-portfolio?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-here
    depends_on:
      - mongodb

volumes:
  mongodb_data:
